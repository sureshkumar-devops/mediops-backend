# Reusable — Node.js Build + SAST + Container Security + ECR Push + Cosign Sign
#
# Called by the notification-service ci-notification.yml workflow.
# Pipeline stages (all in a single job, sequential):
#   1. npm ci + ESLint      — install dependencies + lint (--max-warnings 0)
#   2. npm test             — unit tests with Jest + coverage gate (≥ 80%)
#   3. CodeQL               — JavaScript/TypeScript security-extended queries
#   4. Semgrep              — javascript · nodejs · owasp-top-ten rules
#   5. npm audit            — fail if any HIGH/CRITICAL vulnerabilities found
#   6. Docker build         — multi-stage, non-root UID/GID 1000
#   7. Trivy                — image scan, fail on HIGH/CRITICAL CVEs
#   8. ECR push             — tagged as sha-<7chars>
#   9. Cosign sign          — keyless, GitHub OIDC → Fulcio CA → Rekor transparency log
#
# Outputs: image-tag (sha-<7chars>), registry (ECR registry URL)

name: Reusable — Node.js Build & Security Gates
on: 
 workflow_call:
   inputs:
      service-name:
        description: "Service name (e.g. notification-service)"
        required: true
        type: string
      service-dir:
        description: "Service directory relative to repo root (e.g. notification-service)"
        required: true
        type: string
      ecr-repository:
        description: "ECR repository name"
        required: true
        type: string
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: '20'  
      aws-region:
        description: "AWS region where ECR lives"
        required: false
        type: string
        default: ap-south-1
      needs-database:
        description: "Start a PostgreSQL 15 container for integration tests"
        required: false
        type: boolean
        default: false 
      use-aws:
        description: "Use AWS resources (ECR, OIDC, Cosign keyless signing)"
        required: false
        type: boolean
        default: false        
   outputs:
      image-tag:
        description: "Docker image tag pushed to ECR (format: sha-<7chars>)"
        value: ${{ jobs.build-and-push.outputs.image_tag }}
      registry:
        description: "ECR registry base URL"
        value: ${{ jobs.build-and-push.outputs.registry }}
   secrets:
      AWS_ACCOUNT_ID:
        required: false
      OWASP_API_KEY:
        description: "NVD API key used by OWASP Dependency Check"
        required: true
      SEMGREP_APP_TOKEN:
        required: false
      NVD_API_KEY:
        description: "NIST NVD API key — higher rate limits + faster OWASP NVD updates"
        required: false
env:  
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}  

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  

jobs:
  build-and-push:
    name: Build · SAST · Scan · Push · Sign (${{ inputs.service-name }})
    runs-on: ubuntu-latest
    permissions: 
      id-token: write          # OIDC — AWS + Cosign keyless
      contents: read           # Checkout
      security-events: write   # Upload SARIF (CodeQL, Trivy)
      actions: read            # Required by CodeQL action 

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      #registry:  ${{ steps.login-ecr.outputs.registry }
      #registry: ${{ inputs.use-aws && steps.login-ecr.outputs.registry || env.DOCKER_USER }}
      registry: ${{ steps.login-ecr.outputs.registry || env.DOCKER_USER }}
      
    
    steps:
      # ── Checkout ─────────────────────── 

      - name: 1. Code Checkout
        uses: actions/checkout@v4
      
      # ── Derive short-SHA image tag ──────
      
      - name: Set image Tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT      
      
      # ── Node.js toolchain ────────────────────────────────────────────────────
      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.service-dir }}/package-lock.json

      - name: Install dependencies
        run: cd ${{ inputs.service-dir }} && npm ci

      # ── Lint ──────────────────────────────────────────────────────────────────
      - name: ESLint (--max-warnings 0)
        run: cd ${{ inputs.service-dir }} && npx eslint src/ --ext .js,.ts --max-warnings 0

      # ── Initialize CodeQL tracer BEFORE npm test ──────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended

      # ── Unit tests + coverage ─────────────────────────────────────────────────
      # Jest is configured in package.json; coverage threshold enforced there.
      - name: npm test (Jest + coverage gate ≥ 80%)
        run: cd ${{ inputs.service-dir }} && npm test -- --coverage --ci
        env:
          NODE_ENV: test

      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service-name }}
          path: ${{ inputs.service-dir }}/coverage/
          retention-days: 7

      # ── CodeQL analysis ───────────────────────────────────────────────────────
      - name: CodeQL — Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript

      # ── Semgrep SAST ──────────────────────────────────────────────────────────
      - name: Semgrep SAST (javascript · nodejs · owasp-top-ten)
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/javascript
            p/nodejs
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── npm audit (fail on HIGH/CRITICAL) ─────────────────────────────────────
      - name: npm audit (HIGH/CRITICAL → fail)
        run: cd ${{ inputs.service-dir }} && npm audit --audit-level=high

      # ── AWS credentials via OIDC (no long-lived keys) ─────────────────────────
      - name: Configure AWS credentials (OIDC)
        if: ${{ inputs.use-aws }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/pharma-dev-github-actions-role
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: login-ecr
        if: ${{ inputs.use-aws  }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: 13. Login Docker Hub
        if: ${{ !inputs.use-aws }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}  

      # ── Docker build (multi-stage, non-root UID/GID 1000) ─────────────────────
      - name: Build Docker image
        id: docker-build
        run: |
          # 🔒 Validate Docker username when AWS is NOT used
          if [ -z "${{ env.DOCKER_USER }}" ] && [ "${{ inputs.use-aws }}" != "true" ]; then
            echo "DOCKER_USERNAME is required when not using AWS"
            exit 1
          fi

          # Decide registry
          if [ "${{ inputs.use-aws }}" = "true" ]; then
            REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          else
            REGISTRY="${{ env.DOCKER_USER }}"
          fi

          FULL_IMAGE="$REGISTRY/${{ inputs.ecr-repository }}:${{ steps.meta.outputs.image_tag }}"          
    
          cd ${{ inputs.service-dir }}
    
          docker build \
            --build-arg UID=1000 \
            --build-arg GID=1000 \
            --label org.opencontainers.image.source=${{ github.repository }} \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            -t "$FULL_IMAGE" .

          echo "full_image_path=$FULL_IMAGE" >> $GITHUB_OUTPUT 

      # ── Trivy — image scan (fail on HIGH/CRITICAL CVEs) ───────────────────────
      - name: Trivy — Image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.docker-build.outputs.full_image_path }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.service-name }}

      # ── Push image to ECR ─────────────────────────────────────────────────────
      - name: Push image to ECR
        id: push
        if: github.event_name == 'push'
        run: |
          IMAGE="${{ steps.docker-build.outputs.full_image_path }}"
          docker push "$IMAGE"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" | awk -F@ '{print $2}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Pushed: $IMAGE  (digest: $DIGEST)"

      # ── Cosign keyless sign ────────────────────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Cosign — Sign image (keyless, GitHub OIDC → Fulcio → Rekor)
        if: github.event_name == 'push'
        run: |
          if [ "${{ inputs.use-aws }}" = "true" ]; then
              IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}"
            else
              IMAGE="${{ env.DOCKER_USER }}/${{ inputs.ecr-repository }}"
          fi
     
          DIGEST="${{ steps.push.outputs.digest }}"

          if [ -z "$DIGEST" ]; then
            echo "No digest found, skipping signing"
            exit 0
          fi

          cosign sign --yes "${IMAGE}@${DIGEST}"

        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Cleanup Postgres
        if: ${{ inputs.needs-database }}
        run: docker rm -f testdb || true   

  
