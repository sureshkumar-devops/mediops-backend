name: Java Build and Security Pipeline
on:
  push: 
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
env:
  SERVICE_NAME: "api-gateway"
  SERVICE_DIR: "./api-gateway"
  ECR_REPOSITORY: "api-gateway"
  AWS_REGION: "ap-south-1"
  AWS_ACCOUNT_ID: ""
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-push:
    name: Build · SAST · Scan · Push · Sign
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: Set image Tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Setup Java 17 
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          
      - name: Start PostgreSQL
        run: |
          docker run -d --name testdb -e POSTGRES_DB=testdb -e POSTGRES_USER=testuser -e POSTGRES_PASSWORD=testpass -p 5432:5432 postgres:15-alpine
          until docker exec testdb pg_isready -U testuser; do sleep 2; done

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      - name: maven verify (Tests + JaCoCo 80%)
        run: cd ${{ env.SERVICE_DIR }} && mvn verify --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
       
      - name: CodeQL — Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java
      
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: p/java p/owasp-top-ten
      
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
             ${{ secrets.DOCKER_USERNAME }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          echo "IMAGE-TAG: ${{ secrets.DOCKER_USERNAME }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}" >> $GITHUB_OUTPUT  
