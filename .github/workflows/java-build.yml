name: Java Build and Security Pipeline
on:
  push: 
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
env:
  SERVICE_NAME: "api-gateway"
  SERVICE_DIR: "./api-gateway"
  ECR_REPOSITORY: ""
  AWS_REGION: "ap-south-1"
  AWS_ACCOUNT_ID: ""
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-push:
    name: Build · SAST · Scan · Push · Sign
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: Set image Tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Setup Java 17 
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          
