name: CI/CD — supplier-service

# Triggers on push to develop / release branches only.
# Feature branches and PRs → ci-pr-supplier-service.yml
# PROD promotion → promote-prod.yml (workflow_dispatch)
on:
  push:
    branches: [ develop, 'release/**' ]    
    paths:
        - 'supplier-service/**'
        - '.github/workflows/ci-supplier-service.yml'

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: supplier-service
  GITOPS_REPO: ${{ vars.GITOPS_REPO }}  

jobs:
  build:
    name: Build & Security Gates
    uses: ./.github/workflows/_java-build.yml
    with:
      service-name: supplier-service
      service-dir: supplier-service   
      ecr-repository: supplier-service  
      aws-region: ap-south-1  
      needs-database: true  
    secrets: inherit
    
  deploy-dev:    
    name: Deploy - DEV
    needs: build
    runs-on: ubuntu-latest  
    environment: dev
    steps:
        - name: Code Checkout   
          uses: actions/checkout@v4  
        
        - name: Checkout GitOps repo
          uses: actions/checkout@v4
          with:
            repository: ${{ env.GITOPS_REPO }}
            token: ${{ secrets.GITOPS_MEDICO_TOKEN2 }}  
            path: _gitops
        
        - name: Update image tag - DEV
          env:
            IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          run: |
              yq e ".image.tag = \"${IMAGE_TAG}\"" -i \
                  "_gitops/envs/dev/values-supplier-service.yaml"
                  
              cd _gitops
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add .
              git diff --staged --quiet && echo "Already up to date" && exit 0
              git commit -m "ci(dev): update supplier-service → ${IMAGE_TAG}"
              git push
              
  open-qa-pr:
    name: Open PR — DEV → QA Promotion
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write      
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_MEDICO_TOKEN2 }}            
          path: _gitops

      - name: Create branch, commit, open PR
        env:
          GH_TOKEN: ${{ secrets.GITOPS_MEDICO_TOKEN2 }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          GITOPS_REPO_NAME: ${{ env.GITOPS_REPO }}

        run: |
          VALUES="_gitops/envs/qa/values-supplier-service.yaml"
          BRANCH="promote/qa/supplier-service/${IMAGE_TAG}"

          if [[ ! -f "$VALUES" ]]; then
            echo "::Warning::$VALUES not found in mediops-gitops -QA PR Skipped"
            exit 0
          fi

          cd _gitops
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          # Update the tag
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i "envs/qa/values-supplier-service.yaml"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "QA already has this image - no PR needed"
            exit 0
          fi
          
          git commit -m "promote(qa): supplier-service → ${IMAGE_TAG}"
          git push origin "$BRANCH" --force

          # Create the PR body text
          printf '%s\n' \
            "## QA Promotion" \
            "" \
            "Service : supplier-service" \
            "Image   : ${IMAGE_TAG}" \
            "Branch  : ${REF_NAME}" \
            "Actor   : ${ACTOR}" \
            "Build   : ${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}" \
            "" \
            "## Checklist" \
            "- [ ] DEV smoke test passed (see build link above)" \
            "- [ ] No unexpected config changes in this diff" \
            "- [ ] QA team sign-off" \
            "" \
            "Merging this PR updates envs/qa/values-supplier-service.yaml." \
            "ArgoCD (pharma-qa) auto-syncs on merge." > /tmp/pr-body.md 
         
          gh pr create \
            --repo "$GITOPS_REPO_NAME" \
            --title "promotion(qa): supplier-service → ${IMAGE_TAG}" \
            --body-file /tmp/pr-body.md \
            --head "$BRANCH" \
            --base master || echo "PR already exists"
           
          echo "::Notice Title=QA PR Opened::Review and Merge in ${GITOPS_REPO_NAME} to deploy to QA."
   # ── 4. DAST — ZAP baseline scan against DEV ─────────────────────────────────
  dast:
    name: DAST — ZAP Baseline (DEV)
    if: false
    needs: deploy-dev
    runs-on: ubuntu-latest    
    steps:
      - name: wait for DEV service to be healthy
        run: |
          URL="${{ vars.DEV_SUPPLIER_SERVICE_URL }}/actuator/health"
          for i in $(seq 1 20); do
            curl -sf "$URL" && echo "Healthy" && exit 0
            echo "Attempt $i/20 — retrying in 15s..."
            sleep 15
          done
          echo "::error::DEV endpoint not healthy after 5 minutes."
          exit 1
          
      - name: OWASP ZAP — Baseline scan        
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ vars.DEV_SUPPLIER_SERVICE_URL }}
          fail_action: warn
          artifact_name: zap-report-supplier-service
    





