name: PR Check - api-gateway3
on:
  push:
    branches:
      - feat-*
      - fix-*
      - chore-*
    paths:
      - 'api-gateway/**'
      - '.github/workflows/ci-pr-api-gateway.yml'

  pull_request:
    branches:
      - develop
    paths:
      - 'api-gateway/**'

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  pr-check:
    name: Code CheckOut
    uses: ./.github/workflows/_java-pr-check.yml
    with:
      service-name: api-gateway
      service-dir: api-gateway
      needs-database: false
    secrets: inherit
    
