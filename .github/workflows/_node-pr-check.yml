# Reusable — Lightweight Node.js PR / Feature Branch Check
#
# Used by ci-pr-notification.yml on feat-*, fix-*, chore-* branches and PRs.
# No Docker, no ECR, no Cosign. Fast feedback for developers.
#
# Stages:
#   1. ESLint        — lint (--max-warnings 0)
#   2. Jest          — unit tests + coverage
#   3. CodeQL        — JavaScript security-extended SAST
#   4. Semgrep       — javascript · nodejs · owasp-top-ten rules
#   5. npm audit     — fail on HIGH/CRITICAL vulnerabilities

name: Reusable - Node.js PR Check (no Docker)
on: 
  workflow_call:
    inputs:
        service-name:
          type: string
          required: true
        service-dir:
          type: string  
          required: true
        node-version:
          type: string
          required: false
          default: '20'
    secrets:
      SEMGREP_APP_TOKEN:
        required: false
      OWASP_API_KEY:
        required: false

jobs:
  pr-check:
    name: PR Check (${{ inputs.service-name }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      security-events: write
      actions: read       

    steps:
      - name: Code CheckOut
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.service-dir }}/package-lock.json

      - name: Install Dependencies                
        run: npm ci
        working-directory: ${{ inputs.service-dir }}

      - name: ESLint Check
        #run: npm run lint -- --max-warnings=0 
        run: npx eslint src/ --ext .js,.ts --max-warnings 0
        working-directory: ${{ inputs.service-dir }}
         
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended  

      - name: Jest Tests (test and coverage)
        run: npm test -- --coverage --ci
        working-directory: ${{ inputs.service-dir }}
        env:
          NODE_ENV: test

      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service-name }}
          path: ${{ inputs.service-dir }}/coverage/
          retention-days: 3

      - name: CodeQL — Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript

      - name: Semgrep SAST (javascript · nodejs · owasp-top-ten)
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/javascript
            p/nodejs
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      

      - name: npm Audit (HIGH/CRITICAL → fail)
        run: npm audit --audit-level=high
        working-directory: ${{ inputs.service-dir }}  
