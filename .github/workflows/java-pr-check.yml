name: resuable PRs
on:
 push:
   branches:
     - master
     - dev
 pull_request:
   branches:
     - dev
   paths:
     - 'api-gateway/**'
env:
  SERVICE_NAME: "api-gateway"
  SERVICE_DIR: "./api-gateway"
  ECR_REPOSITORY: "api-gateway"
  AWS_REGION: "ap-south-1"
  AWS_ACCOUNT_ID: ""
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  NEEDS_DATABASE: true

jobs:
   pr-check:
     name: PR Check api-gateway
     runs-on: ubuntu-latest
     permissions: 
       actions: read
       security-events: write
       pull-requests: read
       contents: read
     steps:
       - name: Code Checkout         
         uses: actions/checkout@v4
         with:
           fetch-depth: 0
           
       - name: SetUp Java 17 temurin
         uses: actions/setup-java@v4
         with:
           java-version: '17'
           distribution: temurin
           cache: maven
        
       - name: Start POSTGRESQL (Integration Test)
         if: ${{ env.NEEDS_DATABASE == 'true' }}
         run: |
           docker run -d  \
             --name testdb \
             -e POSTGRES_DB=testdb \
             -e POSTGRES_USER=testuser \
             -e POSTGRES_PASSWORD=testpass \
             -p 5432:5432 \
             postgres:15-alpine

           # Wait for DB to be ready
           until docker exec testdb pg_isready -U testuser -d testdb; do
             echo "Waiting for postgres..."
             sleep 5
           done
           echo "PostgresSQL ready....!"           
                  
       - name: Initialize CodeQL
         uses: github/codeql-action/init@v4
         with:
           languages: java           
           queries: security-extended
       
       - name: Maven Verify (Test + Jacoco Coverage)
         run:  cd ${{ env.SERVICE_DIR }} && mvn verify --no-transfer-progress         
         env:           
           SPRING_DATASOURCE_URL:       ${{ env.NEEDS_DATABASE == 'true' && 'jdbc:postgresql://localhost:5432/testdb' || '' }}
           SPRING_DATASOURCE_USERNAME:  ${{ env.NEEDS_DATABASE && 'testuser' || '' }}           
           SPRING_DATASOURCE_PASSWORD:  ${{ env.NEEDS_DATABASE && 'testpass' || '' }}
       
       - name: Upload JaCocO Coverage Report
         if: always()
         uses: actions/upload-artifact@v4
         with:
           name: coverage-${{ env.SERVICE_NAME }}
           path: ${{ env.SERVICE_DIR }}/target/site/jacoco/
           retention-days: 3
        
       - name: CodeQL - Analyze
         uses: github/codeql-action/analyze@v4
         with:
           category: "/language: java"
       
       - name: Semgrep SAST (Java - OWASP-TOP-TEN)
         uses: semgrep/semgrep-action@v1
         continue-on-error: true
         with:
           config: >-
             p/java
             p/owasp-top-ten
         env:
           SEMGREP_APP_TOKEN: ${{ env.SEMGREP_APP_TOKEN }}    
             
       - name: OWASP Dependency Check (CVSS >= 7.0 - advisory; non-blocking)
         if: true
         continue-on-error: true
         run: |
           cd ${{ env.SERVICE_DIR }}
           mvn org.owasp:dependency-check-maven:check \
             -DfailBuildOnCVSS=7 \
             -DenableRetired=true \
             -DdataDirectory=$HOME/.owasp/dependency-check-data \
             -Dformat=HTML \
             --no-transfer-progress
            
       - name: Upload Dependency Check Report
         if: true
         uses: actions/upload-artifact@v4
         with:
           name: depcheck-${{env.SERVICE_NAME}}
           path: ${{ env.SERVICE_DIR }}/target/dependency-check-report.html
           retention-days: 3
           
           
           
           
           
           
           
           
           
           
           
             
             
             
           
           
           
        
   
   
   
   

    
  
  
  
       
     
     
     
