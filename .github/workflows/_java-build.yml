name: Reusable — Java Build & Security Gates

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name (e.g. api-gateway)"
        required: true
        type: string

      service-dir:
        description: "Service directory relative to repo root"
        required: true
        type: string

      ecr-repository:
        description: "ECR repository name"
        required: true
        type: string

      aws-region:
        description: "AWS region where ECR lives"
        required: false
        type: string
        default: ap-south-1

      needs-database:
        description: "Start PostgreSQL for integration tests"
        required: false
        type: boolean
        default: false

      use-aws:
        description: "Use AWS ECR + OIDC"
        required: false
        type: boolean
        default: false

    outputs:
      image-tag:
        description: "Docker image tag"
        value: ${{ jobs.build-and-push.outputs.image_tag }}

      registry:
        description: "Container registry"
        value: ${{ jobs.build-and-push.outputs.registry }}

    secrets:
      AWS_ACCOUNT_ID:
        required: false

      OWASP_API_KEY:
        required: true

      SEMGREP_APP_TOKEN:
        required: false

      NVD_API_KEY:
        required: false

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build · SAST · Scan · Push · Sign
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      security-events: write
      actions: read

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry: ${{ steps.login-ecr.outputs.registry || env.DOCKER_USER }}

    steps:

      # ─────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────

      - name: 1. Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # Image Tag
      # ─────────────────────────────────────────────

      - name: 2. Set Image Tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────
      # Java Setup
      # ─────────────────────────────────────────────

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # ─────────────────────────────────────────────
      # PostgreSQL
      # ─────────────────────────────────────────────

      - name: 4. Start PostgreSQL
        if: ${{ inputs.needs-database }}
        run: |
          docker run -d \
            --name testdb \
            -e POSTGRES_DB=testdb \
            -e POSTGRES_USER=testuser \
            -e POSTGRES_PASSWORD=testpass \
            -p 5432:5432 \
            postgres:15-alpine

          for i in {1..20}; do
            if docker exec testdb pg_isready -U testuser -d testdb; then
              break
            fi

            echo "Waiting for postgres..."
            sleep 5
          done

          echo "PostgreSQL Ready"

      # ─────────────────────────────────────────────
      # CodeQL
      # ─────────────────────────────────────────────

      - name: 5. Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended

      # ─────────────────────────────────────────────
      # Maven Build
      # ─────────────────────────────────────────────

      - name: 6. Maven Verify
        working-directory: ${{ inputs.service-dir }}
        run: mvn verify --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: ${{ inputs.needs-database && 'jdbc:postgresql://localhost:5432/testdb' || '' }}
          SPRING_DATASOURCE_USERNAME: ${{ inputs.needs-database && 'testuser' || '' }}
          SPRING_DATASOURCE_PASSWORD: ${{ inputs.needs-database && 'testpass' || '' }}

      - name: 7. Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service-name }}
          path: ${{ inputs.service-dir }}/target/site/jacoco/
          retention-days: 7

      - name: 8. Analyze CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:java

      # ─────────────────────────────────────────────
      # Semgrep
      # ─────────────────────────────────────────────

      - name: 9. Semgrep Scan
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: |
            p/java
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ─────────────────────────────────────────────
      # AWS Login
      # ─────────────────────────────────────────────

      - name: 10. Configure AWS Credentials
        if: ${{ inputs.use-aws }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/pharma-github-actions-role
          aws-region: ${{ inputs.aws-region }}

      - name: 11. Login Amazon ECR
        id: login-ecr
        if: ${{ inputs.use-aws }}
        uses: aws-actions/amazon-ecr-login@v2

      # ─────────────────────────────────────────────
      # DockerHub Login
      # ─────────────────────────────────────────────

      - name: 12. Login DockerHub
        if: ${{ !inputs.use-aws }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ─────────────────────────────────────────────
      # Setup Buildx
      # ─────────────────────────────────────────────

      - name: 13. Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────────────
      # Build Docker Image
      # ─────────────────────────────────────────────

      - name: 14. Build Docker Image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service-dir }}
          load: true
          push: false

          tags: |
            ${{ inputs.use-aws && format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, inputs.ecr-repository, steps.meta.outputs.image_tag) || format('{0}/{1}:{2}', env.DOCKER_USER, inputs.ecr-repository, steps.meta.outputs.image_tag) }}

          build-args: |
            UID=1000
            GID=1000

          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────────────────────
      # Trivy Scan
      # ─────────────────────────────────────────────

      - name: 15. Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.use-aws && format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, inputs.ecr-repository, steps.meta.outputs.image_tag) || format('{0}/{1}:{2}', env.DOCKER_USER, inputs.ecr-repository, steps.meta.outputs.image_tag) }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - name: 16. Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.service-name }}

      # ─────────────────────────────────────────────
      # Push Docker Image
      # ─────────────────────────────────────────────

      - name: 17. Push Docker Image
        id: push
        if: github.event_name == 'push'
        run: |

          if [ "${{ inputs.use-aws }}" = "true" ]; then
            IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ steps.meta.outputs.image_tag }}"
          else
            IMAGE="${{ env.DOCKER_USER }}/${{ inputs.ecr-repository }}:${{ steps.meta.outputs.image_tag }}"
          fi

          docker push "$IMAGE"

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" | awk -F@ '{print $2}')

          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────
      # Cosign
      # ─────────────────────────────────────────────

      - name: 18. Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: 19. Sign Image
        if: github.event_name == 'push'
        run: |

          if [ "${{ inputs.use-aws }}" = "true" ]; then
            IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}"
          else
            IMAGE="${{ env.DOCKER_USER }}/${{ inputs.ecr-repository }}"
          fi

          DIGEST="${{ steps.push.outputs.digest }}"

          if [ -z "$DIGEST" ]; then
            echo "No digest found"
            exit 0
          fi

          cosign sign --yes "${IMAGE}@${DIGEST}"

        env:
          COSIGN_EXPERIMENTAL: "true"

      # ─────────────────────────────────────────────
      # Cleanup
      # ─────────────────────────────────────────────

      - name: 20. Cleanup PostgreSQL
        if: ${{ inputs.needs-database }}
        run: docker rm -f testdb || true
